databases:
  - name: scheduler-db
    plan: free

services:
  - type: web
    name: doctor-scheduler
    env: python
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn run:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scheduler-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

